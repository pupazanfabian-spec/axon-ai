name: Build Axon Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'artifacts/ai-brain/**'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Expo Prebuild
        working-directory: artifacts/ai-brain
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_PUBLIC_LLM_ENABLED: 'true'

      - name: Generate release keystore
        working-directory: artifacts/ai-brain/android
        run: |
          keytool -genkeypair \
            -keystore axon-release.keystore \
            -alias axon \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass axon2024 \
            -keypass axon2024 \
            -dname "CN=Axon AI, OU=Mobile, O=Axon, L=RO, S=RO, C=RO" \
            -noprompt

      - name: Add signing config to build.gradle
        working-directory: artifacts/ai-brain/android/app
        run: |
          sed -i 's/buildTypes {/signingConfigs {\n        axonRelease {\n            storeFile file("..\/axon-release.keystore")\n            storePassword "axon2024"\n            keyAlias "axon"\n            keyPassword "axon2024"\n        }\n    }\n    buildTypes {/' build.gradle
          sed -i 's/release {/release {\n                signingConfig signingConfigs.axonRelease/' build.gradle

      - name: Build Release APK
        working-directory: artifacts/ai-brain/android
        run: ./gradlew assembleRelease --no-daemon
        env:
          GRADLE_OPTS: '-Xmx4g -XX:MaxMetaspaceSize=512m'
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Rename and stage APK
        run: |
          APK=$(find artifacts/ai-brain/android/app/build/outputs/apk/release -name "*.apk" | head -1)
          cp "$APK" Axon-AI-v3.1.0-release.apk
          ls -lh Axon-AI-v3.1.0-release.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Axon-AI-v3.1.0
          path: Axon-AI-v3.1.0-release.apk
          retention-days: 30

      - name: Summary
        run: |
          echo "## ✅ Axon AI v3.1.0 APK Ready" >> $GITHUB_STEP_SUMMARY
          echo "Descarcă APK-ul din secțiunea **Artifacts** de mai sus." >> $GITHUB_STEP_SUMMARY
          echo "### Funcții noi:" >> $GITHUB_STEP_SUMMARY
          echo "- App Builder Intelligence (500+ DEV_CONCEPTS)" >> $GITHUB_STEP_SUMMARY
          echo "- Dev Mode cu syntax highlighting" >> $GITHUB_STEP_SUMMARY
          echo "- Project Switcher" >> $GITHUB_STEP_SUMMARY
          echo "- OTA update support" >> $GITHUB_STEP_SUMMARY
