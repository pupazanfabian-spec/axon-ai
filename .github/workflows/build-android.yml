name: Build Axon Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'artifacts/ai-brain/**'
      - '.github/workflows/build-android.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('artifacts/ai-brain/android/**/*.gradle*') }}
          restore-keys: gradle-

      - name: Expo Prebuild
        working-directory: artifacts/ai-brain
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_PUBLIC_LLM_ENABLED: 'true'

      - name: Set Gradle memory in gradle.properties
        working-directory: artifacts/ai-brain/android
        run: |
          echo "" >> gradle.properties
          echo "org.gradle.jvmargs=-Xmx6g -XX:MaxMetaspaceSize=2g -XX:+UseParallelGC" >> gradle.properties
          echo "org.gradle.parallel=true" >> gradle.properties
          echo "org.gradle.caching=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties

      - name: Generate release keystore
        working-directory: artifacts/ai-brain/android
        run: |
          keytool -genkeypair \
            -keystore axon-release.keystore \
            -alias axon \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass axon2024 \
            -keypass axon2024 \
            -dname "CN=Axon AI, OU=Mobile, O=Axon, L=RO, S=RO, C=RO" \
            -noprompt

      - name: Add signing config to build.gradle
        working-directory: artifacts/ai-brain/android/app
        run: |
          sed -i 's/buildTypes {/signingConfigs {\n        axonRelease {\n            storeFile file("..\/axon-release.keystore")\n            storePassword "axon2024"\n            keyAlias "axon"\n            keyPassword "axon2024"\n        }\n    }\n    buildTypes {/' build.gradle
          sed -i 's/release {/release {\n                signingConfig signingConfigs.axonRelease/' build.gradle

      - name: Build Release APK
        working-directory: artifacts/ai-brain/android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Rename and stage APK
        run: |
          APK=$(find artifacts/ai-brain/android/app/build/outputs/apk/release -name "*.apk" | head -1)
          cp "$APK" Axon-AI-v3.1.0-release.apk
          ls -lh Axon-AI-v3.1.0-release.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Axon-AI-v3.1.0
          path: Axon-AI-v3.1.0-release.apk
          retention-days: 30

      - name: Summary
        run: |
          echo "## Axon AI v3.1.0 APK Ready" >> $GITHUB_STEP_SUMMARY
          echo "Descarcă APK-ul din secțiunea **Artifacts** de mai sus." >> $GITHUB_STEP_SUMMARY
